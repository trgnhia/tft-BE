server:
  port: ${SERVER_PORT:8081}
  # Enable graceful shutdown (wait for active requests to finish before killing process)
  shutdown: graceful
  servlet:
    context-path: ${CONTEXT_PATH:/api/v1}
spring:
  application:
    name: infra-core
  jackson:
    # Force ISO-8601 string output (e.g., "2023-10-25T14:30:00Z") instead of [2023, 10...]
    serialization:
      write-dates-as-timestamps: false
    # Enforce UTC for all JSON responses (Consistent with Instant usage)
    time-zone: UTC
    # Ignore unknown properties in JSON to prevent errors when FE sends extra fields
    deserialization:
      fail-on-unknown-properties: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}
    username: ${PG_USER}
    password: ${PG_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
    jpa:
      hibernate:
        ddl-auto: none
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
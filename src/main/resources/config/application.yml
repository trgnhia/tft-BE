server:
  port: ${SERVER_PORT:8081}
  # Enable graceful shutdown (wait for active requests to finish before killing process)
  shutdown: graceful
  servlet:
    context-path: ${CONTEXT_PATH:/api/v1}
spring:
  application:
    name: infra-core
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:2MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:2MB}
  jackson:
    # Force ISO-8601 string output (e.g., "2023-10-25T14:30:00Z") instead of [2023, 10...]
    serialization:
      write-dates-as-timestamps: false
    # Enforce UTC for all JSON responses (Consistent with Instant usage)
    time-zone: UTC
    # Ignore unknown properties in JSON to prevent errors when FE sends extra fields
    deserialization:
      fail-on-unknown-properties: false

    # --- CẤU HÌNH FLYWAY ---
  flyway:
    enabled: true
    # Cho phép chạy các file migration có version thấp hơn version hiện tại của DB (Giải quyết conflict khi merge code nhóm)
    out-of-order: true
    # Tự động tạo baseline nếu database đã có sẵn các bảng
    baseline-on-migrate: true
    baseline-version: "0" # Đặt phiên bản gốc là 0
    # Thư mục chứa các file SQL migration
    locations: classpath:db/migration
    # Tên bảng lưu lịch sử chạy migration trên PostgreSQL
    table: flyway_schema_history

  security:
    jwt-secret-key: ${JWT_SECRET:}
    isSecure: ${SECURED:false}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
    refresh-path: ${CONTEXT_PATH:/api/v1}/auth/refresh
    access-token-cookie: access-token
    refresh-token-cookie: refresh-token
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}
    username: ${PG_USER}
    password: ${PG_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
    jpa:
      hibernate:
        ddl-auto: none
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

cookie:
  same-site: ${COOKIE_SAME_SITE:Lax}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
    max-image-size-bytes: ${APP_UPLOAD_MAX_IMAGE_SIZE_BYTES:2097152}
